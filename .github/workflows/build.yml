name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*', '[0-9]*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.41.4'
  FLUTTER_CHANNEL: 'stable'

jobs:
  # ---------------------------------------------------------------------------
  # Lint + test once on Linux (fastest), shared across platforms.
  # ---------------------------------------------------------------------------
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  # ---------------------------------------------------------------------------
  # Android APK + AAB
  # ---------------------------------------------------------------------------
  build-android:
    name: Build Android
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flow_pomodoro-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: flow_pomodoro-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows .exe (zipped runner bundle)
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    needs: analyze-test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Package Windows release
        working-directory: build/windows/x64/runner
        shell: pwsh
        run: Compress-Archive -Path Release\* -DestinationPath flow_pomodoro-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow_pomodoro-windows
          path: build/windows/x64/runner/flow_pomodoro-windows.zip
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Linux bundle (tar.gz)
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Pub get
        run: flutter pub get

      - name: Build Linux (release)
        run: flutter build linux --release

      - name: Package Linux bundle
        working-directory: build/linux/x64/release
        run: tar -czf flow_pomodoro-linux-x64.tar.gz -C bundle .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: flow_pomodoro-linux-x64
          path: build/linux/x64/release/flow_pomodoro-linux-x64.tar.gz
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # On tag push (vX.Y.Z): publish all artifacts to a GitHub Release AND
  # commit them to release/<tag>/ on the default branch.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-android, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage binaries into release/<tag>/
        run: |
          TAG="${GITHUB_REF_NAME}"
          DEST="release/${TAG}"
          mkdir -p "$DEST"
          cp artifacts/flow_pomodoro-android-apk/app-release.apk        "$DEST/flow_pomodoro-${TAG}.apk"
          cp artifacts/flow_pomodoro-android-aab/app-release.aab        "$DEST/flow_pomodoro-${TAG}.aab"
          cp artifacts/flow_pomodoro-windows/flow_pomodoro-windows.zip  "$DEST/flow_pomodoro-${TAG}-windows.zip"
          cp artifacts/flow_pomodoro-linux-x64/flow_pomodoro-linux-x64.tar.gz \
                                                                       "$DEST/flow_pomodoro-${TAG}-linux-x64.tar.gz"
          ls -lh "$DEST"

      # Binaries are attached to the GitHub Release below; we deliberately do
      # NOT commit them back to the repo (kept release/ out of git via
      # .gitignore so the working tree stays small).

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/${{ github.ref_name }}/flow_pomodoro-${{ github.ref_name }}.apk
            release/${{ github.ref_name }}/flow_pomodoro-${{ github.ref_name }}.aab
            release/${{ github.ref_name }}/flow_pomodoro-${{ github.ref_name }}-windows.zip
            release/${{ github.ref_name }}/flow_pomodoro-${{ github.ref_name }}-linux-x64.tar.gz
